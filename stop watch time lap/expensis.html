    <input type="text" id="txt" placeholder="Add expensis">

 <ul id="fillis"></ul>

        let add = document.querySelector('#add');

        add.addEventListener('click',()=>{
            console.log("add was click")

            document.querySelector('#catgor').value='';
            console.log(exp,amt,date,catgo);
            expensis.push({exp,amt:Number(amt),date,catgo});
             
            let list = document.querySelector('#list');
            let ol = document.createElement('ol');
            ol.innerText = `expen : ${exp}, amount : ${amt} , date : ${date}, Category: ${catgo}`;
            list.appendChild(ol);    
            
    sum = sum + Number(amt);
 total.innerText = `total expensis : ${sum}`;


 let remove = document.createElement('button');
        remove.innerText = "Remove";
        ol.appendChild(remove);


        remove.addEventListener('click',()=>{
            console.log("remove was click")
            list.removeChild(ol)
            sum = sum - Number(amt);
             total.innerText = `total expensis : ${sum}`;
        
        });





        
 




        
 localStorage.setItem('expensis', JSON.stringify(expensis));
