<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .ti{
        font-size: 50px;
        font-weight: bold;
        
    }
    #st,#sop,#reset,#lap{
        font-size: 20px;
        padding: 10px;
       
    }
    
    </style>
</head>
<body>
     <h1>stop watch</h1>
    <div class="ti">00:00:00</div>
  <button id="st">Start</button>
  <button id="sop">Stop</button>   
<button id="reset">Reset</button>
<button id="lap">Lap</button>
<div id="laps"></div> 
        <script>
       


        let time = document.querySelector('.ti');
        const start = document.querySelector('#st');
        let stop = document.querySelector('#sop');
        let hr = 0;
        let min = 0;
        let sec = 0;
        let timer;

        let isrun = false;

start.addEventListener('click',()=>{
    console.log('start was clicked');

    if(isrun){
        return

    }
    isrun = true;
 timer = setInterval(()=>{
        sec++;
        if(sec == 60){
         min++;
            sec = 0;
        }
        if(min == 60){
         hr++;
            min = 0;
        }

        let h,m,s;
        if(hr<10){
           h =  '0' + hr;
        }else{
            h = hr;
        }

        if(min<10){
         m =  '0' + min;
        }else{
           m = min; 
        }

        if(sec<10){
            s =  '0' + sec;
        }else{
            s = sec;
        }


        // let h = (hr<10) ? 0 +hr : hr;
        // let m = (min < 10) ? 0 + min : min;
        // let s = (sec < 10) ? 0 + sec : sec;
     time.innerText = `${h}:${m}:${s}`;
    },1000);


  
});

stop.addEventListener('click',()=>{
    console.log('stop was clicked');
    clearInterval(timer);
    isrun = false;
});

reset.addEventListener('click',()=>{
    console.log("reset was clicked");
    clearInterval(timer);
    isrun = false;
    hr = 0;
    min = 0;
    sec = 0;
    time.innerText = '00:00:00';
});











let lapbtn = document.querySelector('#lap');

lapbtn.addEventListener('click',()=>{
    console.log("lap was clicked");
    let laptime = time.innerText;
    let craetlap = document.createElement('div');
    craetlap.innerText = `lap : ${laptime}`;
    let savelap = document.querySelector('#laps');
    savelap.appendChild(craetlap);


});
         </script>
    
</body>
</html>
